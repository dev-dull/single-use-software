<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ skill_name }} — SUS Skills</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --muted: #666;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e0e0e0;
      --radius: 8px;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 2rem;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .top-bar h1 { font-size: 1.5rem; }

    .top-actions {
      display: flex;
      gap: .5rem;
    }

    .btn {
      display: inline-block;
      padding: .45rem .9rem;
      font-size: .85rem;
      border-radius: var(--radius);
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-weight: 500;
      transition: background .15s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #d0d0d0; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: var(--danger-hover); }

    .content-body {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 2rem;
      line-height: 1.7;
    }

    .content-body h1 { font-size: 1.4rem; margin: 1rem 0 .5rem; }
    .content-body h2 { font-size: 1.2rem; margin: 1.25rem 0 .5rem; }
    .content-body h3 { font-size: 1.05rem; margin: 1rem 0 .4rem; }
    .content-body p { margin-bottom: .75rem; }
    .content-body ul, .content-body ol { margin: .5rem 0 .75rem 1.5rem; }
    .content-body code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
      font-size: .88em;
      background: #f0f0f0;
      padding: .15em .35em;
      border-radius: 3px;
    }
    .content-body pre {
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: .75rem 0;
      font-size: .85rem;
      line-height: 1.5;
    }
    .content-body pre code {
      background: none;
      padding: 0;
      color: inherit;
    }
    .content-body table {
      width: 100%;
      border-collapse: collapse;
      margin: .75rem 0;
      font-size: .9rem;
    }
    .content-body th, .content-body td {
      border: 1px solid var(--border);
      padding: .45rem .65rem;
      text-align: left;
    }
    .content-body th { background: #f9f9f9; font-weight: 600; }
    .content-body blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      color: var(--muted);
      margin: .75rem 0;
    }
    .content-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: .9rem;
      color: var(--accent);
      text-decoration: none;
    }

    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>{{ skill_name }}</h1>
      <div class="top-actions">
        {% if not is_guide %}
        <a class="btn btn-primary" href="/skills/{{ skill_name }}/edit">Edit</a>
        {% if skill_name.upper() != "AUTHORING" %}
        <form method="post" action="/skills/{{ skill_name }}/delete" style="display:inline"
              onsubmit="return confirm('Delete skill {{ skill_name }}?');">
          <input type="hidden" name="_method" value="DELETE" />
          <button type="submit" class="btn btn-danger">Delete</button>
        </form>
        {% endif %}
        {% endif %}
      </div>
    </div>

    <div class="content-body">
      {{ content_html | safe }}
    </div>

    <a class="back-link" href="/skills">Back to skills list</a>
  </div>
</body>
</html>
