<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤨</text></svg>" />
  <title>{% if mode == 'create' %}New Skill{% else %}Edit {{ skill.name }}{% endif %} — SUS</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --muted: #666;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e0e0e0;
      --radius: 8px;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 2rem;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }

    .errors {
      background: #fef2f2;
      border: 1px solid var(--danger);
      border-radius: var(--radius);
      padding: .75rem 1rem;
      margin-bottom: 1rem;
      color: var(--danger);
      font-size: .9rem;
    }

    .errors ul { margin-left: 1.25rem; }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: .35rem;
      font-size: .9rem;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: .55rem .75rem;
      font-size: .95rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card-bg);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }

    textarea {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
      font-size: .88rem;
      line-height: 1.6;
      min-height: 420px;
      resize: vertical;
    }

    .field { margin-bottom: 1.25rem; }

    .btn {
      display: inline-block;
      padding: .5rem 1rem;
      font-size: .9rem;
      border-radius: var(--radius);
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-weight: 500;
      transition: background .15s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #d0d0d0; }

    .form-actions {
      display: flex;
      gap: .75rem;
      align-items: center;
      margin-top: .5rem;
    }

    .guide-link {
      font-size: .85rem;
      color: var(--accent);
      text-decoration: none;
      margin-left: auto;
    }

    .guide-link:hover { text-decoration: underline; }

    .preview-area {
      display: none;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-top: 1rem;
      font-size: .95rem;
      line-height: 1.7;
      white-space: pre-wrap;
      font-family: inherit;
    }

    .preview-area.visible { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>{% if mode == 'create' %}Create New Skill{% else %}Edit: {{ skill.name }}{% endif %}</h1>

    {% if errors %}
    <div class="errors">
      <ul>
        {% for err in errors %}
        <li>{{ err }}</li>
        {% endfor %}
      </ul>
    </div>
    {% endif %}

    <form method="post"
          action="{% if mode == 'create' %}/skills{% else %}/skills/{{ skill.name }}/update{% endif %}">
      {% if mode == 'create' %}
      <div class="field">
        <label for="name">Skill Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. data-engineering"
               value="{{ skill.name if skill else '' }}" required />
      </div>
      {% endif %}

      <div class="field">
        <label for="content">Content (Markdown)</label>
        <textarea id="content" name="content" placeholder="# Skill: Domain Name&#10;&#10;> Summary of this skill...">{{ skill.content if skill else '' }}</textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" class="btn btn-secondary" onclick="togglePreview()">Preview</button>
        <a class="btn btn-secondary" href="/skills">Cancel</a>
        <a class="guide-link" href="/skills/guide" target="_blank">Authoring Guide</a>
      </div>
    </form>

    <div id="preview" class="preview-area"></div>
  </div>

  <script>
    function togglePreview() {
      var preview = document.getElementById('preview');
      var content = document.getElementById('content').value;
      if (preview.classList.contains('visible')) {
        preview.classList.remove('visible');
      } else {
        preview.textContent = content;
        preview.classList.add('visible');
      }
    }
  </script>
</body>
</html>
