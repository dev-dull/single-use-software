<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Build: {{ team }}/{{ app_slug }}</title>
  {% if not pod_ip %}
  <meta http-equiv="refresh" content="3" />
  {% endif %}

  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-header: #1a1a2e;
      --border-color: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --btn-save: #238636;
      --btn-save-hover: #2ea043;
      --btn-publish: #8957e5;
      --btn-publish-hover: #a371f7;
      --divider-width: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 16px;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border-color);
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .header-left a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.15s;
    }

    .header-left a:hover { color: var(--accent); }

    .app-name { font-weight: 600; font-size: 15px; color: var(--text-primary); }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .btn {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      color: #fff;
    }

    .btn-save { background: var(--btn-save); }
    .btn-save:hover { background: var(--btn-save-hover); }
    .btn-publish { background: var(--btn-publish); }
    .btn-publish:hover { background: var(--btn-publish-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .panes {
      display: flex;
      height: calc(100vh - 48px);
      background: var(--bg-primary);
    }

    .terminal-pane {
      flex: 0 0 60%;
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      min-width: 200px;
      overflow: hidden;
    }

    .terminal-pane-header {
      padding: 6px 12px;
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      user-select: none;
    }

    .terminal-iframe {
      flex: 1;
      border: none;
      background: #000;
    }

    .divider {
      flex: 0 0 var(--divider-width);
      background: var(--border-color);
      cursor: col-resize;
      transition: background 0.15s;
      user-select: none;
    }

    .divider:hover, .divider.active { background: var(--accent); }

    .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 200px;
      overflow: hidden;
    }

    .preview-pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      user-select: none;
    }

    .btn-refresh {
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-refresh:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    #preview-iframe {
      flex: 1;
      border: none;
      background: #fff;
    }

    .status-msg {
      padding: 2rem;
      color: var(--text-secondary);
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <a href="/">&larr; Catalog</a>
      <span class="app-name">{{ team }}/{{ app_slug }}</span>
    </div>
    <div class="header-right">
      <button class="btn btn-save" id="btn-save" onclick="doSave()">Save</button>
      <button class="btn btn-publish" id="btn-publish" onclick="doPublish()">Publish</button>
    </div>
  </div>

  <div class="panes">
    <div class="terminal-pane" id="terminal-pane">
      <div class="terminal-pane-header">Terminal</div>
      {% if pod_ip %}
      <iframe class="terminal-iframe"
              src="/build/{{ team }}/{{ app_slug }}/terminal/?pod_ip={{ pod_ip }}"></iframe>
      {% else %}
      <div class="status-msg">Waiting for build pod to start...</div>
      {% endif %}
    </div>
    <div class="divider" id="divider"></div>
    <div class="preview-pane" id="preview-pane">
      <div class="preview-pane-header">
        <span>Preview</span>
        <button class="btn-refresh" id="btn-refresh" onclick="refreshPreview()">Refresh</button>
      </div>
      <iframe id="preview-iframe"
              src="/build/{{ team }}/{{ app_slug }}/preview/?pod_ip={{ pod_ip }}"></iframe>
    </div>
  </div>

  <script>
    const TEAM = "{{ team }}";
    const APP_SLUG = "{{ app_slug }}";
    const POD_IP = "{{ pod_ip }}";
    const BASE = `/build/${TEAM}/${APP_SLUG}`;

    // --- Resizable divider ---
    const divider = document.getElementById('divider');
    const terminalPane = document.getElementById('terminal-pane');
    const panes = document.querySelector('.panes');
    let isDragging = false;

    divider.addEventListener('mousedown', (e) => {
      isDragging = true;
      divider.classList.add('active');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const rect = panes.getBoundingClientRect();
      const pct = Math.min(Math.max(((e.clientX - rect.left) / rect.width) * 100, 15), 85);
      terminalPane.style.flex = `0 0 ${pct}%`;
    });

    document.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      divider.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });

    // --- Heartbeat ---
    setInterval(() => {
      fetch(`${BASE}/heartbeat?pod_ip=${encodeURIComponent(POD_IP)}`, {
        method: 'POST',
      }).catch(() => {});
    }, 30000);

    // --- Save / Publish ---
    async function doSave() {
      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      try {
        const resp = await fetch(`${BASE}/save?pod_ip=${encodeURIComponent(POD_IP)}`, { method: 'POST' });
        const data = await resp.json();
        if (data.status === 'save_requested') {
          btn.textContent = 'Saved!';
          setTimeout(() => { btn.textContent = 'Save'; }, 2000);
        }
      } catch (err) {
        console.error('Save failed:', err);
      } finally {
        btn.disabled = false;
      }
    }

    // --- Preview refresh ---
    function refreshPreview() {
      const iframe = document.getElementById('preview-iframe');
      if (iframe) {
        iframe.src = iframe.src;
      }
    }

    // Auto-retry on error: if the initial preview load fails (502/503),
    // keep retrying every 3s until it succeeds, then stop.
    // This handles the race where the runner hasn't started yet.
    let _previewRetries = 0;
    const _maxRetries = 20;  // Stop after ~60s
    const _retryTimer = setInterval(() => {
      if (_previewRetries >= _maxRetries) { clearInterval(_retryTimer); return; }
      const iframe = document.getElementById('preview-iframe');
      if (!iframe) return;
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        const text = (doc && doc.body) ? doc.body.innerText : '';
        if (text.includes('Bad Gateway') || text.includes('502') || text.includes('503') ||
            text.includes('preview will appear')) {
          _previewRetries++;
          refreshPreview();
        } else if (text.trim().length > 0) {
          // Loaded successfully — stop retrying.
          clearInterval(_retryTimer);
        }
      } catch (e) {
        // Cross-origin means something loaded — stop.
        clearInterval(_retryTimer);
      }
    }, 3000);

    let isPublishing = false;

    // Warn if the user tries to leave during publish.
    window.addEventListener('beforeunload', (e) => {
      if (isPublishing) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    async function doPublish() {
      const btn = document.getElementById('btn-publish');
      const saveBtn = document.getElementById('btn-save');
      btn.disabled = true;
      saveBtn.disabled = true;
      btn.textContent = 'Publishing...';
      isPublishing = true;
      try {
        const resp = await fetch(`${BASE}/publish?pod_ip=${encodeURIComponent(POD_IP)}`, { method: 'POST' });
        const data = await resp.json();
        if (data.status === 'publish_requested') {
          btn.textContent = 'Published!';
          btn.style.background = '#16a34a';
          // Show success overlay — the Run link is the primary action.
          const overlay = document.createElement('div');
          overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999;';
          overlay.innerHTML = `
            <div style="background:#1a1a2e;border:1px solid #30363d;border-radius:12px;padding:2.5rem;text-align:center;max-width:400px;">
              <div style="font-size:2rem;margin-bottom:0.5rem;">&#10003;</div>
              <h2 style="color:#e6edf3;margin-bottom:0.5rem;">Published!</h2>
              <p style="color:#8b949e;margin-bottom:1.5rem;">Your app is live and ready to use.</p>
              <a href="/run/${TEAM}/${APP_SLUG}" style="display:inline-block;padding:10px 24px;background:#16a34a;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:15px;">Run it now &rarr;</a>
              <br/>
              <a href="/" style="color:#8b949e;font-size:13px;margin-top:12px;display:inline-block;text-decoration:none;">Back to catalog</a>
            </div>`;
          document.body.appendChild(overlay);
        } else if (data.status === 'error') {
          btn.textContent = 'Error';
          btn.style.background = '#dc2626';
          alert('Publishing failed: ' + (data.detail || 'unknown error'));
          setTimeout(() => { btn.textContent = 'Publish'; btn.style.background = ''; }, 3000);
        }
      } catch (err) {
        console.error('Publish failed:', err);
        btn.textContent = 'Error';
        btn.style.background = '#dc2626';
        alert('Publishing failed — please try again.');
        setTimeout(() => { btn.textContent = 'Publish'; btn.style.background = ''; }, 3000);
      } finally {
        isPublishing = false;
        btn.disabled = false;
        saveBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
