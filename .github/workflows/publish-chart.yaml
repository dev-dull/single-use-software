name: Publish Helm Chart

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set chart version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/^version:.*/version: $VERSION/" charts/sus/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/sus/Chart.yaml
          echo "Chart version set to $VERSION"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package charts/sus

      - name: Push chart to GHCR
        run: helm push sus-${{ env.VERSION }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
